default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgresql://localhost:5432/aurospace_development') %>

test:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL', 'postgresql://localhost:5432/aurospace_test') %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
